name: Bug report
description: Report a problem with the action
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow step
      description: The action step from your workflow (inputs you passed).
      render: yaml
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: "Paste the action's log output. Enable `debug_mode: true` for more detail."
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Action version
      description: e.g. v1, v1.0.2, or a commit SHA
    validations:
      required: true
